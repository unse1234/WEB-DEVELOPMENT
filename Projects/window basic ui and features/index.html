<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Window Home Page
    </title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"/>
</head>
<body>
       <main>
          
          <div class="clickMenu">
            <div class="menu-title">Quick actions</div>
            <div class="menu-item"><i class="ri-eye-line"></i><span>View</span></div>
            <div class="menu-item"><i class="ri-refresh-line"></i><span>Refresh</span></div>
            <div class="menu-item"><i class="ri-layout-grid-line"></i><span>Sort by</span></div>
            <div class="menu-item"><i class="ri-add-line"></i><span>New</span></div>
            <div class="menu-item"><i class="ri-monitor-line"></i><span>Display settings</span></div>
            <div class="menu-item"><i class="ri-settings-2-line"></i><span>Settings</span></div>
            <div class="menu-item"><i class="ri-information-line"></i><span>Help</span></div>
            <div class="menu-divider"></div>
            <div class="menu-item"><i class="ri-shut-down-line"></i><span>Shut down</span></div>
          </div>

          <div class="startMenu">
            <button><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3.00098 5.47902L10.3778 4.4625V11.5902H3.00098V5.47902ZM3.00098 18.521L10.3778 19.5375V12.4982H3.00098V18.521ZM11.1894 19.646L21.001 21V12.4982H11.1894V19.646ZM11.1894 4.35402V11.5902H21.001V3L11.1894 4.35402Z"></path></svg> </button>
          <span class="tooltip">Start</span>
        </div>

       </main>
